[theme]
base = "light"
primaryColor = "#1c3461"
backgroundColor = "#f5f6fa"
secondaryBackgroundColor = "#ffffff"
textColor = "#1a1d23"
font = "sans serif"

[server]
headless = true

[client]
# "minimal" hides the Share / Star / GitHub fork buttons from the top-right
# toolbar on Streamlit Community Cloud. Combined with the CSS injected in
# app.py, this removes all default Streamlit chrome from the UI.
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
